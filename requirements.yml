name: medllm
channels:
  - defaults
  - conda-forge
dependencies:
  - python>=3.10
  - pip
  - pip:
    # Core GCP / ML
    - google-genai>=1.63.0,<2.0
    - pydantic>=2.0
    - google-cloud-bigquery>=3.0
    - google-cloud-bigquery-storage>=2.0
    - google-auth>=2.0
    - db-dtypes
    # Data / evaluation
    - pandas>=2.0
    - scikit-learn
    - numpy
    - pyarrow>=14.0
    # Local vector search
    - faiss-cpu>=1.7.4
    # Sparse retrieval (BM25)
    - bm25s>=0.3
    - PyStemmer>=2.2
    # Utilities
    - tqdm
    - tenacity
    # Testing
    - pytest